<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Tailwind CSS Links -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- CSS Link -->
    <link rel="stylesheet" href="./style.css">

    <!-- Fontawesome linking -->
    <script src="https://kit.fontawesome.com/b69ca7fe35.js" crossorigin="anonymous"></script>

    <!-- Google Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <div class="container">
            <h1>Job Application Tracker</h1>
            <div class="count-boxes">
                <div class="count-box">
                    <div class="title">Total</div>
                    <div id="count-1" class="count-1">8</div>
                </div>
                <div class="count-box">
                    <div class="title">Interviewed</div>
                    <div id="count-2" class="count-2">0</div>
                </div>
                <div class="count-box">
                    <div class="title">Rejected</div>
                    <div id="count-3" class="count-3">0</div>
                </div>
            </div>
        </div>
    </header>
    
</body>
</html>
